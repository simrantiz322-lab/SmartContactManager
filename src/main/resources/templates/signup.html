<!DOCTYPE html>
<html lang="en"  xmlns:th="http://www.thymeleaf.org" th:replace="base::layout(~{::section})">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<section>
    <div class="container">
        <div class="row">
            <div class="col-md-6 offset-md-3">
                <div class="my-card">

                    <div  th:if="${session.message}" th:classappend="${session.message.type}" class="alert" role="alert">
                        <p class="text-center" th:text="${session.message.content}"></p>

                        <th:block th:text="${@sessionHelper.removeMessageFromSession}" ></th:block>

                    </div>

                    <div class="container text-center">
                        <img style="width:100px" th:src="@{/Image/edit.png}">
                    </div>

                    <h1 class="text-center">Register Here</h1>


                    <!--by defaulthtml validation is off now-->
                    <form novalidate action="" th:action="@{/do-register}" method="post" th:object="${user}">

                        <!--Name Field-->
                        <div class="form-group">
                            <label for="name_field">Your Name</label>
                            <input type="text" class="form-control" id="name_field"
                                   aria-describedby="emailHelp" placeholder="Enter here." required
                                    th:value="${user.username}" name="username"
                                   th:classappend="${#fields.hasErrors('username')? 'is-invalid':''}">

                            <!--This field would be shown only if is-valid class is added-->
                            <div th:each="e:${#fields.errors('username')}"
                                 th:text="${e}"
                                 id="validationServer03Feedback"
                                 class="invalid-feedback">

                            </div>



                        </div>

                        <!--email Field-->
                        <div class="form-group">
                            <label for="email_field">Your Email</label>
                            <input type="text" class="form-control" id="email_field"
                                   aria-describedby="emailHelp" placeholder="Enter here." required
                                   th:value="${user.useremail}" name="useremail"
                                   th:classappend="${#fields.hasErrors('useremail')? 'is-invalid':''}">

                            <div th:each="e:${#fields.errors('useremail')}"
                                 th:text="${e}"
                                 id="emailField"
                                 class="invalid-feedback">

                            </div>

                        </div>

                        <!--password Field-->
                        <div class="form-group">
                            <label for="password_field">Your Password</label>
                            <input type="password" class="form-control" id="password_field"
                                   aria-describedby="emailHelp" placeholder="Enter here." required
                                      name="password">

                        </div>



                        <div class="form-group">

                            <textarea class="form-control" placeholder="Enter something about yourself"
                                      th:text="${user.about}" rows="6" name="about"></textarea>
                                     <!--use text instead of value-->

                        </div>


                        <!--Terms and conditions field-->
                        <div class="form-group form-check text-center">
                            <input type="checkbox"
                                    name="agreement"
                                    class="form-check-input"
                                   id="agreement"
                            />
                            <label>Accept Terms And Condition</label>

                        </div>

                        <div class="container text-center">
                            <button  type="submit" class="btn bg-primary text-white">Submit</button>
                            <button type="reset" class="btn btn-warning">Reset</button>
                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</section>


</body>
</html>
