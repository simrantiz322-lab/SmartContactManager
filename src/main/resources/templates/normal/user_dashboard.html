<!DOCTYPE html>

    <meta charset="UTF-8">
    <title>user_dashboard</title>
</head>
<body>

<section>
   <div class="container">
       <div class="card">
           <div class="card-body my-5">

               <div class="container text-center">
                   <img class="my-profile-picture" style="height:200px; width:200px"
                        src="" th:src="@{'/Image/default.png'}" alt="profile photo"/>
               </div>

               <h1 class="mt-3 text-secondary font-italic text-center">Start adding your contacts.</h1>

               <a th:href="@{/user/add-contact}" class="btn btn-primary mt-4 btn-block text-uppercase">Add new contact</a>

           </div>
       </div>
   </div>
