<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:fragment="layout(content)">
<head>
  <!-- Required meta tags -->
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Bootstrap CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" crossorigin="anonymous">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" th:href="@{/CSS/style.css}"/>
  <title th:text="${title}"></title>
</head>
<body>

<!--Nav bar-->
<nav class="fixed-top navbar navbar-expand-lg navbar-dark bg-primary">
  <a class="navbar-brand" href="#">Smart Contact Manager</a>
  <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
    <span class="navbar-toggler-icon"></span>
  </button>

  <div class="collapse navbar-collapse" id="navbarSupportedContent">
    <ul class="navbar-nav ml-auto text-uppercase" >
      <li class="nav-item active">
        <a class="nav-link" th:href="@{/}" href="#">Home <span class="sr-only">(current)</span></a>
      </li>


      <li class="nav-item">
        <a class="nav-link" href="#"><span th:text="${user.username}"></span></a>
      </li>

      <li class="nav-item">
        <a class="nav-link" th:href="@{/logout}">Logout</a>
      </li>
    </ul>

  </div>
</nav>
<!--End of nav bar-->


<!--start of sidebar-->
<div class="sidebar mt-2">

  <span onclick="toggleSidebar()" class="crossBtn">&times</span>

  <a id="home-link" href="#" class="item" th:href="@{/user/index}"><i class="fa-solid fa-house"></i> Home</a>
  <a id="contacts-link" href="#" class="item" th:href="@{/user/show-contacts/0}"><i class="fa-solid fa-address-book"></i> View Contacts</a>
  <a id="add-link" href="#" class="item" th:href="@{/user/add-contact}"><i class="fa-regular fa-address-card"></i> Add Contact</a>
  <a id="profile-link" href="#" class="item" th:href="@{/user/profile}"><i class="fa-solid fa-user"></i> Your Profile</a>
  <a id="settings-link" href="#" class="item" th:href="@{/user/settings}"><i class="fa-solid fa-gear"></i> Settings</a>
  <a href="#" class="item" th:href="@{/logout}"><i class="fa-solid fa-arrow-right-from-bracket"></i> Logout</a>

  <div class="divider"></div>

</div>
<!--End of sidebar-->



<!--content area-->
<div class="content mt-5">

  <i onclick="toggleSidebar()" class="fas fa-bars m-3"></i>


  <div th:if="${session.message}" class="container text-center">

    <div th:classappend="${'alert-'+session.message.type}" class="alert" role="alert">
      <span th:text="${session.message.content}"></span>

    </div>

    <th:block th:text="${@sessionHelper.removeMessageFromSession}" ></th:block>

  </div>

  <div th:replace="${content}"></div>
</div>







<!-- Optional JavaScript; choose one of the two! -->

<!-- Option 1: jQuery and Bootstrap Bundle (includes Popper) -->
<script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-Fy6S3B9q64WdZWQUiU+q4/2Lc9npb8tCaSX9FK7E8HnRr0Jz8D6OP9dO5Vg3Q9ct" crossorigin="anonymous"></script>
<script src="https://unpkg.com/sweetalert/dist/sweetalert.min.js"></script>
<script>


  function deleteContact(id){

  swal({
  title: "Are you sure?",
  text: "You want to delete this contact",
  icon: "warning",
  buttons: true,
  dangerMode: true,
})
.then((willDelete) => {
  if (willDelete) {
    window.location="/user/delete/"+id;
  } else {
    swal("Your contact is safe!");
  }
});

  }


</script>
<script th:src="@{/JS/script.js}"></script>
<!-- Option 2: Separate Popper and Bootstrap JS -->

<script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js" integrity="sha384-9/reFTGAW83EW2RDu2S0VKaIzap3H66lZH81PoYlFhbGU+6BZp6G7niu735Sk7lN" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.min.js" integrity="sha384-+sLIOodYLS7CIrQpBjl+C7nPvqq+FbNUBDunl/OZv93DB7Ln/533i8e/mZXLi/P+" crossorigin="anonymous"></script>
-->
</body>
</html>
