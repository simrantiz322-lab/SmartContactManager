<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="normal/base::layout(~{::section})">
<head>
    <meta charset="UTF-8">
    <title>update_contact</title>
</head>
<body>

<section>
    <div class="card mr-3 ml-3">

        <div class="card-body">



            <h1 class="text-center">Update Contact</h1>

            <div class="container-fluid mt-1">

                <div class="row">

                    <div class="col-md-8 offset-md-2">



                        <form action="#"

                              th:object="${contact}"

                              enctype="multipart/form-data"

                              method="POST"

                              th:action="@{/user/process-contact}"

                              class="mt-2"

                        >

                            <!-- Hidden Contact id-->
                            <input type="hidden" th:value="${contact.contactid}" name="contactid" />





                            <!-- First Name-->

                            <div class="input-group">

                                <div class="input-group-prepend">

                                    <div class="input-group-text">

                                        <i class="fa fa-plus"></i>

                                    </div>

                                </div>

                                <!--add required in other fields also as per yourself-->
                                <input required type="text" id="firtName"
                                       name="name" placeholder="Enter Name here" class="form-control"
                                th:value="${contact.name}"/>

                            </div>





                            <!-- Second Name-->

                            <div class="input-group mt-3">

                                <div class="input-group-prepend">

                                    <div class="input-group-text">

                                        <i class="fas fa-user-alt"></i>

                                    </div>

                                </div>

                                <input type="text" id="secondname"
                                       name="nickname" placeholder="Enter Nickname here"
                                       th:value="${contact.nickname}"
                                       class="form-control"/>

                            </div>



                            <!-- phone number-->

                            <div class="input-group mt-3">

                                <div class="input-group-prepend">

                                    <div class="input-group-text">

                                        <i class="fas fa-phone"></i>

                                    </div>

                                </div>

                                <input required min="10"  type="number" id="phone"
                                       name="phone" placeholder="Enter Phone Number here"
                                       th:value="${contact.phone}"
                                       class="form-control"/>

                            </div>




                            <!--Email-->

                            <div class="input-group mt-3">

                                <div class="input-group-prepend">

                                    <div class="input-group-text">

                                        @

                                    </div>

                                </div>

                                <input  type="email" id="email"
                                        name="email" placeholder="Enter Email here" class="form-control"
                                        th:value="${contact.email}"/>

                            </div>




                            <!-- work field-->

                            <div class="input-group mt-3">

                                <div class="input-group-prepend">

                                    <div class="input-group-text">

                                        <i class="fa fa-briefcase"></i>

                                    </div>

                                </div>

                                <input type="text" id="work"
                                       name="work" placeholder="Enter Work here" class="form-control"
                                       th:value="${contact.work}"/>

                            </div>


                            <!--description-->

                            <div class="form-group mt-3">

                <textarea name="description" id="mytextarea" rows="8" class="form-control"
                          placeholder="Enter Contact description" ></textarea>

                            </div>


                            <!--contact image-->

                            <div class="custom-file">

                                <input type="file" name="profileImage" />

                            </div>


                            <!--button-->

                            <div class="container text-center">


                                <button class="btn btn-outline-primary">Update</button>


                            </div>







                        </form>



                    </div>


                </div>


            </div>

        </div>

    </div>

    <!--for that beautiful editing font in description-->
    <script src="https://cdn.tiny.cloud/1/xfgwf3oct7ghi2shyqihzvsypadjrp1wvt9snewi44f952sr/tinymce/8/tinymce.min.js" referrerpolicy="origin" crossorigin="anonymous"></script>

    <script>
        tinymce.init({
          selector: '#mytextarea'   <!--text area id should be same as this-->
        });
    </script>




</section>

</body>
</html>
