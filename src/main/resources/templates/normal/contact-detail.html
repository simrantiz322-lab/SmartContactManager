<!DOCTYPE html>
<html lang="en" th:replace="normal/base::layout(~{::section})"
      xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">

</head>
<body>

<section>

    <div class="card mr-3 ml-3" th:if="${contact}" >  <!--contact aaega toh hi chlega-->
        <div class="card-body" >

            <div class="container text-center">

                <img class="my-profile-picture" style="height:200px; width:200px"
                     src="" th:src="@{'/Image/'+${contact.image}}" alt="profile photo"/>

                <h1 class="mt-3" >
                    <span th:text="${contact.name}"></span>(<span th:text="${contact.nickname}"></span>)
                </h1>


                <table class="table">
                    <thead>
                    <tr>
                        <th scope="col">#ID</th>
                        <th scope="col"><span th:text="'SCM'+${contact.contactid}"></span></th>

                    </tr>
                    </thead>
                    <tbody>
                    <tr>
                        <th scope="row">Email</th>
                        <td><span th:text="${contact.email}"></span></td>

                    </tr>


                    <tr>
                        <th scope="row">Phone</th>
                        <td><span th:text="${contact.phone}"></span></td>

                    </tr>



                    <tr>
                        <th scope="row">Work</th>
                        <td><span th:text="${contact.work}"></span></td>

                    </tr>

                    </tbody>
                </table>

                <div class="description mt-3 mr-3 text-center">
                    <h4 th:utext="${contact.description}"></h4>
                </div>

                <div class="container contact-actions">
                    <a class="btn btn-danger btn-block btn-action" href="#" th:onclick="|deleteContact(${contact.contactid})|">Delete</a>
                    <a class="btn btn-success btn-block btn-action"
                            href="#"
                            th:href="@{'/user/update/'+${contact.contactid}}" >Update</a>
                </div>

            </div>

        </div>



    </div>

    <div>
        <!--contact nhi aaega toh chlega-->
        <h1 class="text-center p-3 bg-danger text-white" th:unless="${contact}">You do not have permission to see this contact</h1>
    </div>

</section>

</body>
</html>
